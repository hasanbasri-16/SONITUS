[build]
  publish = "public"
  # No functions, no scheduled jobs — Netlify only hosts the static site now.
  # The cron/data pipeline runs entirely on GitHub Actions (see .github/workflows/scan-market.yml).

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
